run-name: Build OVA ${{ inputs.id }} ${{ inputs.is_stage && ' - is stage' || '' }}${{ inputs.checksum && ' - checksum' || '' }} - Branch ${{ github.ref_name }} - Launched by @${{ github.actor }}
name: Build OVA

on:
  workflow_dispatch:
    inputs:
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      checksum:
        type: boolean
        description: |
          Generate package checksum.
          Default is 'false'.
        required: false
      wazuh_virtual_machines_reference:
        description: 'Branch or tag of the wazuh-virtual-machines repository'
        required: true
      is_stage:
        description: "Is stage?"
        type: boolean
        default: false
      ova_revision:
        type: string
        description: 'Revision of the OVA file. Use "0" for development builds'
        required: true
        default: '0'
      wazuh_package_type:
        description: 'Wazuh package type to be used in the OVA'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - pre-prod
      destroy:
        description: 'Destroy the base instance after the OVA is created'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      id:
        type: string
        required: false
      checksum:
        type: boolean
        required: false
      wazuh_virtual_machines_reference:
        type: string
        required: true
      is_stage:
        type: boolean
        required: false
        default: false
      ova_revision:
        type: string
        required: false
        default: '0'
      wazuh_package_type:
        type: string
        required: false
        default: 'prod'
      destroy:
        type: boolean
        required: false
        default: true
      is_pr_check:
        type: boolean
        required: false
        default: false
    outputs:
      ova_s3_path:
        description: 'S3 URI of the built OVA'
        value: ${{ jobs.build.outputs.ova_s3_path }}
      ova_revision:
        description: 'Revision of the built OVA'
        value: ${{ inputs.ova_revision }}

env:
    AWS_REGION: "us-east-1"
    ALLOCATOR_PATH: "/tmp/allocatorvm_ova"
    WORKFLOW_VENV: "${{ github.workspace }}/workflow_venv"
    S3_BUCKET_TO_STORE_OVA: ${{ vars.AWS_S3_BUCKET }}
    S3_PATH_TO_STORE_OVA: "development/wazuh/5.x/secondary/ova"
    LOCAL_ARTIFACT_URLS_FILEPATH: /tmp/${{ vars.ARTIFACT_URL_FILE_NAME }}
    WVM_REPO_NAME: ${{ github.event.repository.name }}
    WVM_REPOSITORY_PATH: "https://github.com/${{ github.repository }}.git"
    OVA_SCRIPTS_PATH: "${{ github.workspace }}/utils/scripts/ova_build"
    OVA_SET_DEFAULT_SCRIPT_NAME: "setOVADefault.sh"
    OVA_OVF_TEMPLATE_NAME: "wazuh_ovf_template"
    BOX_DEFAULT_NAME: "al2023"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ova_matrix: ${{ steps.set_filenames.outputs.ova_matrix }}
      box_matrix: ${{ steps.set_filenames.outputs.box_matrix }}
      ova_source_filename: ${{ steps.set_filenames.outputs.ova_source_filename }}
      box_source_filename: ${{ steps.set_filenames.outputs.box_source_filename }}
      ova_s3_path: ${{ steps.set_filenames.outputs.ova_s3_path }}
      instance_id: ${{ steps.alloc_vm_ova.outputs.INSTANCE_ID }}
    steps:
      - name: View parameters
        run: echo "${{ toJson(inputs) }}"

      - name: Checkout wazuh/wazuh-virtual-machines repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.wazuh_virtual_machines_reference }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "${{ env.AWS_REGION }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install workflow dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q jq
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          python3 -m venv ${{ env.WORKFLOW_VENV }}
          source ${{ env.WORKFLOW_VENV }}/bin/activate
          pip install --upgrade pip --quiet
          pip install pyyaml --quiet

      - name: Get Wazuh version
        run: |
          WAZUH_VERSION=$(jq -r '.version' VERSION.json)
          WAZUH_MAJOR=$(echo "$WAZUH_VERSION" | cut -d '.' -f 1)
          WAZUH_MINOR=$(echo "$WAZUH_VERSION" | cut -d '.' -f 1-2)
          WAZUH_REVISION=$(jq -r '.stage' VERSION.json)
          echo WAZUH_VERSION=$WAZUH_VERSION >> $GITHUB_ENV
          echo WAZUH_MAJOR=$WAZUH_MAJOR >> $GITHUB_ENV
          echo WAZUH_MINOR=$WAZUH_MINOR >> $GITHUB_ENV
          echo WAZUH_REVISION=$WAZUH_REVISION >> $GITHUB_ENV

      - name: Setting FILENAME var
        id: set_filenames
        run: |
          COMMIT_SHA=$(git rev-parse --short ${{ github.sha }})

          if [ ${{ inputs.is_stage }} == true ]; then
            FILENAME_OVA="wazuh-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}.ova"
            FILENAME_BOX="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}.box"
            OVA_MATRIX=$(jq -nc '[{"filename": $f}]' --arg f "$FILENAME_OVA")
            BOX_MATRIX=$(jq -nc '[{"filename": $f}]' --arg f "$FILENAME_BOX")
          else
            FILENAME_OVA="wazuh-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}_${COMMIT_SHA}.ova"
            FILENAME_BOX="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-${{ inputs.ova_revision }}_${COMMIT_SHA}.box"
            FILENAME_OVA_LATEST="wazuh-${{ env.WAZUH_VERSION }}-latest.ova"
            FILENAME_BOX_LATEST="ova-${{ env.BOX_DEFAULT_NAME }}-base-${{ env.WAZUH_VERSION }}-latest.box"
            OVA_MATRIX=$(jq -nc '[{"filename": $f1}, {"filename": $f2}]' --arg f1 "$FILENAME_OVA" --arg f2 "$FILENAME_OVA_LATEST")
            BOX_MATRIX=$(jq -nc '[{"filename": $f1}, {"filename": $f2}]' --arg f1 "$FILENAME_BOX" --arg f2 "$FILENAME_BOX_LATEST")
          fi

          echo "FILENAME_OVA=$FILENAME_OVA" >> $GITHUB_ENV
          echo "FILENAME_BOX=$FILENAME_BOX" >> $GITHUB_ENV
          echo "ova_matrix=$OVA_MATRIX" >> $GITHUB_OUTPUT
          echo "box_matrix=$BOX_MATRIX" >> $GITHUB_OUTPUT
          echo "ova_source_filename=$FILENAME_OVA" >> $GITHUB_OUTPUT
          echo "box_source_filename=$FILENAME_BOX" >> $GITHUB_OUTPUT

          OVA_S3_PATH="s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$FILENAME_OVA"
          echo "ova_s3_path=$OVA_S3_PATH" >> $GITHUB_OUTPUT

      - name: Allocate EC2 metal instance
        id: alloc_vm_ova
        run: |
          mkdir -p ${{ env.ALLOCATOR_PATH }}

          # Write SSH private key
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ${{ env.ALLOCATOR_PATH }}/key.pem
          chmod 600 ${{ env.ALLOCATOR_PATH }}/key.pem

          # Resolve latest Amazon Linux 2023 AMI
          AMI_ID=$(aws ec2 describe-images \
            --owners amazon \
            --filters "Name=name,Values=al2023-ami-2023.*-x86_64" "Name=state,Values=available" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text --region ${{ env.AWS_REGION }})
          echo "Using AMI: $AMI_ID"

          # Launch spot c5.metal instance (required for nested VirtualBox virtualization)
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "$AMI_ID" \
            --instance-type c5.metal \
            --key-name ${{ vars.EC2_KEY_PAIR_NAME }} \
            --security-group-ids ${{ vars.EC2_SECURITY_GROUP_ID }} \
            --instance-market-options '{"MarketType":"spot","SpotOptions":{"SpotInstanceType":"one-time"}}' \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=ova-builder-${{ github.run_id }}},{Key=purpose,Value=build-ova},{Key=WorkflowRun,Value=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}]" \
            --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":50,"VolumeType":"gp3"}}]' \
            --query 'Instances[0].InstanceId' --output text --region ${{ env.AWS_REGION }})
          echo "Launched instance: $INSTANCE_ID"

          # Wait for instance to be fully ready (up to 25 minutes)
          echo "Waiting for instance to pass status checks..."
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID" --region ${{ env.AWS_REGION }}

          # Get public IP
          INSTANCE_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text --region ${{ env.AWS_REGION }})
          echo "Instance IP: $INSTANCE_IP"

          echo "INSTANCE_HOSTNAME=$INSTANCE_IP" >> $GITHUB_ENV
          echo "INSTANCE_PORT=22" >> $GITHUB_ENV
          echo "INSTANCE_KEY=${{ env.ALLOCATOR_PATH }}/key.pem" >> $GITHUB_ENV
          echo "INSTANCE_USER=ec2-user" >> $GITHUB_ENV
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Get artifacts URLs file
        run: |
          if [ "${{ inputs.wazuh_package_type }}" == "prod" ]; then
            curl -f "https://packages.wazuh.com/production/${{ env.WAZUH_MAJOR }}.x/artifact_urls_${{ env.WAZUH_VERSION }}.yaml" -o ${{ env.LOCAL_ARTIFACT_URLS_FILEPATH }}
          elif [ "${{ inputs.wazuh_package_type }}" == "pre-prod" ]; then
            curl -f "https://packages-staging.xdrsiem.wazuh.info/pre-release/${{ env.WAZUH_MAJOR }}.x/artifact_urls_${{ env.WAZUH_VERSION }}-${{ env.WAZUH_REVISION }}.yaml" -o ${{ env.LOCAL_ARTIFACT_URLS_FILEPATH }}
          fi

      - name: Install necessary dependencies in the AWS instance to create the OVA
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            sudo yum install -y python3-pip git
            sudo pip3 install hatch
          EOF

      - name: Clone repo on remote instance
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            git clone -b ${{ inputs.wazuh_virtual_machines_reference }} ${{ env.WVM_REPOSITORY_PATH }}
          EOF

      - name: Copy artifacts URLs file to remote instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              "${{ env.LOCAL_ARTIFACT_URLS_FILEPATH }}" \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}

      - name: Run the OVA PreConfigurer module
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo hatch run dev-ova-pre-configurer:run
          EOF

      - name: Run the OVA PostConfigurer module
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo vagrant ssh -c 'cd /tmp/wazuh-virtual-machines && sudo hatch run dev-ova-post-configurer:run --packages-url-path $(basename ${{ env.LOCAL_ARTIFACT_URLS_FILEPATH }})'
          EOF

      - name: Stop the Vagrant VM, modify the network and export it as OVA
        run: |
          ssh -p ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              -o 'StrictHostKeyChecking no' \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }} << EOF
            set -e
            cd ${{ env.WVM_REPO_NAME }}
            sudo vagrant halt
            sudo vboxmanage modifyvm ova_base --nic2 hostonly
            sudo vboxmanage modifyvm ova_base --cableconnected2 on
            sudo vboxmanage export ova_base --output ${{ env.FILENAME_OVA }}
            sudo chmod 0755 ${{ env.FILENAME_OVA }}
          EOF

      - name: Getting OVA from AWS instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}/${{ env.FILENAME_OVA }} ${{ github.workspace }}/${{ env.FILENAME_OVA }}

      - name: Getting Amazon Linux 2023 Vagrant Box from AWS instance
        run: |
          scp -P ${{ env.INSTANCE_PORT }} \
              -i ${{ env.INSTANCE_KEY }} \
              ${{ env.INSTANCE_USER }}@${{ env.INSTANCE_HOSTNAME }}:~/${{ env.WVM_REPO_NAME }}/${{ env.BOX_DEFAULT_NAME }}.box ${{ github.workspace }}/${{ env.FILENAME_BOX }}

      - name: Standarizing OVA
        run: |
          sudo chmod 0777 ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_SET_DEFAULT_SCRIPT_NAME }}
          sed -i "s|ovf:capacity=\"40\"|ovf:capacity=\"50\"|g" ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_OVF_TEMPLATE_NAME }}
          sudo bash ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_SET_DEFAULT_SCRIPT_NAME }} "${{ env.OVA_SCRIPTS_PATH }}/" "${{ github.workspace }}/${{ env.FILENAME_OVA }}" "${{ github.workspace }}/${{ env.FILENAME_OVA }}" ${{ env.OVA_SCRIPTS_PATH }}/${{ env.OVA_OVF_TEMPLATE_NAME }} "${{ env.WAZUH_VERSION }}"

      - name: Upload built OVA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-ova
          path: ${{ github.workspace }}/${{ env.FILENAME_OVA }}

      - name: Upload built BOX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-box
          path: ${{ github.workspace }}/${{ env.FILENAME_BOX }}

  upload_ova:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.build.outputs.ova_matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "${{ env.AWS_REGION }}"

      - name: Download built OVA
        uses: actions/download-artifact@v4
        with:
          name: built-ova

      - name: Upload OVA to S3
        run: |
          SOURCE_FILE="${{ needs.build.outputs.ova_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"
          aws s3 cp --quiet "$SOURCE_FILE" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"
          echo "S3 OVA URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"

      - name: Generate and upload sha512
        if: ${{ inputs.checksum == true }}
        run: |
          SOURCE_FILE="${{ needs.build.outputs.ova_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"
          sha512sum "$SOURCE_FILE" | sed "s|$SOURCE_FILE|$DEST_FILE|" > "${DEST_FILE}.sha512"
          aws s3 cp --quiet "${DEST_FILE}.sha512" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"
          echo "S3 sha512 URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"

  upload_box:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.build.outputs.box_matrix) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "${{ env.AWS_REGION }}"

      - name: Download built BOX
        uses: actions/download-artifact@v4
        with:
          name: built-box

      - name: Upload BOX to S3
        run: |
          SOURCE_FILE="${{ needs.build.outputs.box_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"
          aws s3 cp --quiet "$SOURCE_FILE" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"
          echo "S3 BOX URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/$DEST_FILE"

      - name: Generate and upload sha512
        if: ${{ inputs.checksum == true }}
        run: |
          SOURCE_FILE="${{ needs.build.outputs.box_source_filename }}"
          DEST_FILE="${{ matrix.filename }}"
          sha512sum "$SOURCE_FILE" | sed "s|$SOURCE_FILE|$DEST_FILE|" > "${DEST_FILE}.sha512"
          aws s3 cp --quiet "${DEST_FILE}.sha512" "s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"
          echo "S3 sha512 URI: s3://${{ env.S3_BUCKET_TO_STORE_OVA }}/${{ env.S3_PATH_TO_STORE_OVA }}/${DEST_FILE}.sha512"

  cleanup:
    needs: [build, upload_ova, upload_box]
    if: always() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "${{ env.AWS_REGION }}"

      - name: Delete allocated VM
        if: inputs.destroy == true && needs.build.outputs.instance_id != ''
        run: aws ec2 terminate-instances --instance-ids ${{ needs.build.outputs.instance_id }} --region ${{ env.AWS_REGION }} --skip-os-shutdown
